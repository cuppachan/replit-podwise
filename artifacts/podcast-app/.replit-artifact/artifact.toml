kind = "mobile"
previewPath = "/"
title = "Podwise"
version = "1.0.0"
id = "artifacts/podcast-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 23710

[services.development]
run = "pnpm --filter @workspace/podcast-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/podcast-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/podcast-app", "run", "serve" ]

[services.env]
PORT = "23710"
BASE_PATH = "/"
